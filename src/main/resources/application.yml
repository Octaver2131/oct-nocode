spring:
  application:
    name: oct-nocode-backend
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oct_nocode
    username: root
    password: root
server:
  port: 8080
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.octaver.octnocode.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

